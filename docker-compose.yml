version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: dairyfresh_db
      MYSQL_USER: ${DB_USER:-dairyuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dairypass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    image: tomcat:10-jdk21
    restart: always
    environment:
      DB_URL: jdbc:mysql://db:3306/dairyfresh_db
      DB_USER: ${DB_USER:-dairyuser}
      DB_PASSWORD: ${DB_PASSWORD:-dairypass}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/target/backend.war:/usr/local/tomcat/webapps/backend.war
    depends_on:
      - db

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Mount the frontend dist directory. Ensure 'npm run build' is run before formatting.
      - ./dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  db_data:
