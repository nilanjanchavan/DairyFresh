services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass1234}
      MYSQL_DATABASE: dairyfresh_db
      MYSQL_USER: ${DB_USER:-dairyuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dairypass}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: eclipse-temurin:21-jdk
    restart: always
    network_mode: host
    environment:
      DB_URL: jdbc:mysql://localhost:3307/dairyfresh_db?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&serverTimezone=UTC
      DB_USER: ${DB_USER:-dairyuser}
      DB_PASSWORD: ${DB_PASSWORD:-dairypass}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dairyfresh.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/app/firebase-service-account.json}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      MAX_LOGIN_DEVICES: ${MAX_LOGIN_DEVICES:-3}
    volumes:
      - ./backend/target/backend-1.0-SNAPSHOT.jar:/app/backend.jar
      - ./firebase-service-account.json:/app/firebase-service-account.json
    working_dir: /app
    command: java -jar backend.jar
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    network_mode: host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  db_data:
