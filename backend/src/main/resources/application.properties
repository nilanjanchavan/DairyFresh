spring.application.name=backend
server.port=8080

# Database Configuration using environment variables or defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dairyfresh_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool settings (HikariCP is default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Custom Application Properties
admin.email=${ADMIN_EMAIL:admin@dairyfresh.com}
admin.password=${ADMIN_PASSWORD:admin123}
